  - name: "GitLab Blog"
    url: "https://about.gitlab.com/atom.xml"
    lang: "en"
    description: "GitLab CI/CD, DevSecOps, releases, features platform"
    category: "devops/cicd"

  # --- AI / ML ---
  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
