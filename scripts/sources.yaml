# Weekly Tech Radar - Sources RSS/Atom
# Dernière mise à jour : 2026-03-18
# 25 sources testées et fonctionnelles

sources:
  # --- Cloud / DevOps / Infrastructure ---
  - name: "AWS News Blog"
    url: "https://aws.amazon.com/blogs/aws/feed/"
    lang: "en"
    description: "Blog officiel AWS - annonces produits, nouvelles features, tutorials"
    category: "cloud"

  - name: "AWS DevOps Blog"
    url: "https://aws.amazon.com/blogs/devops/feed/"
    lang: "en"
    description: "CI/CD, IaC, automation et best practices DevOps sur AWS"
    category: "cloud/devops"

  - name: "Azure Blog"
    url: "https://azure.microsoft.com/en-us/blog/feed/"
    lang: "en"
    description: "Annonces Azure, AKS, services cloud Microsoft"
    category: "cloud"

  - name: "Kubernetes Blog"
    url: "https://kubernetes.io/feed.xml"
    lang: "en"
    description: "Blog officiel Kubernetes - releases, KEPs, features, security advisories"
    category: "devops/orchestration"

  - name: "CNCF Blog"
    url: "https://www.cncf.io/blog/feed/"
    lang: "en"
    description: "Cloud Native Computing Foundation - projets graduated/incubating, écosystème cloud-native"
    category: "devops/cloud-native"

  - name: "HashiCorp Blog"
    url: "https://www.hashicorp.com/blog/feed.xml"
    lang: "en"
    description: "Terraform, Vault, Consul, Nomad, Packer - IaC et secrets management"
